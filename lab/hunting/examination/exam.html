<header class="app-header">
  <a class="back-link" href="index.html">←</a>
  <h1>知識試験 過去問演習</h1>
</header>
<main>

  <div class="card" id="setupPanel">
    <h3>出題設定</h3>
    <div class="settings-panel">
      <div class="settings-row">
        <label for="licenseSelect">免許種別</label>
        <select id="licenseSelect">
          <option value="gun">第一種銃猟</option>
          <option value="trap">わな猟</option>
        </select>
      </div>
      <div class="settings-row">
        <label for="modeSelect">モード</label>
        <select id="modeSelect">
          <option value="all">通常演習（全問からランダム）</option>
          <option value="wrong">間違えた問題のみ復習</option>
        </select>
      </div>
      <div class="settings-row">
        <label for="catSelect">出題分野</label>
        <select id="catSelect"></select>
      </div>
      <div class="settings-row">
        <label for="numSelect">出題数</label>
        <select id="numSelect">
          <option value="10">10問</option>
          <option value="20">20問</option>
          <option value="999">出題範囲すべて</option>
        </select>
      </div>
    </div>
    <button class="btn block" id="startBtn" style="margin-top:14px;">演習を開始</button>
    <p id="wrongCountInfo" style="font-size:0.85rem;color:var(--color-text-muted);margin-top:8px;"></p>
  </div>

  <div id="quizArea" style="display:none;"></div>
  <div id="resultArea" style="display:none;"></div>

  <div class="card">
    <h3>成績履歴（直近20件）</h3>
    <div id="historyTableWrap"></div>
  </div>
</main>
<footer class="app-footer">狩猟免許（第一種銃猟／わな猟）学習サイト</footer>

<script src="js/common.js"></script>
<script src="js/exam.js"></script>
</body>
</html>
