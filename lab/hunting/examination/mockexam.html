<header class="app-header">
  <a class="back-link" href="index.html">←</a>
  <h1>模擬試験（30問・90分）</h1>
  <span class="timer-display" id="timerDisplay" style="color:#fff;padding-right:8px;"></span>
</header>
<main>

  <div class="card" id="introPanel">
    <h2>本試験形式の模擬試験</h2>
    <div class="settings-row" style="margin-bottom:12px;">
      <label for="licenseSelect">免許種別</label>
      <select id="licenseSelect">
        <option value="gun">第一種銃猟</option>
        <option value="trap">わな猟</option>
      </select>
    </div>
    <p>三肢択一 全30問（法令13問・猟具6問・鳥獣9問・保護管理2問の比率で出題）、制限時間90分。</p>
    <p>正答率<b>70%（21問）以上</b>で合格判定となります。開始すると全問が1ページに表示されるので、最後まで解答してから「採点する」を押してください。</p>
    <button class="btn block" id="startBtn">模擬試験を開始する</button>
  </div>

  <div id="examArea" style="display:none;"></div>
  <div id="resultArea" style="display:none;"></div>

  <div class="card">
    <h3>模擬試験の履歴（直近20件）</h3>
    <div id="historyTableWrap"></div>
  </div>
</main>
<footer class="app-footer">狩猟免許（第一種銃猟／わな猟）学習サイト</footer>
